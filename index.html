<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Applications of Quantum Machine Learning in Financial Markets</title>
<style>
  :root{
    --bg:#E8F3FF;
    --panel:#DCEBFA;
    --panel-line:#C3DCF5;
    --text:#1C1A28;
    --muted:#3E3A52;
    --classical:#FFC3A0;
    --classical-deep:#F2A87E;
    --quantum-a:#C9B6FF;
    --quantum-b:#9FE8DD;
    --quantum-c:#8FB8FF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
  }
  .wrap{max-width:1140px; margin:0 auto; padding:0 40px;}

  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.25;
    z-index:-1;
    pointer-events:none;
  }
  .blob1{width:400px; height:400px; background:var(--quantum-a); top:-120px; right:-100px;}
  .blob2{width:360px; height:360px; background:var(--quantum-b); bottom:10%; left:-140px;}

  .hero{
    padding:80px 0 60px;
    position:relative;
    text-align:center;
  }
  .hero h1, .hero .sub{margin-left:auto; margin-right:auto;}
  .eyebrow{
    font-size:14px;
    letter-spacing:0.08em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:20px;
    font-weight:bold;
  }
  h1{
    font-weight:700;
    font-size:clamp(32px, 5vw, 54px);
    line-height:1.2;
    max-width:1000px;
    color:#000;
  }
  .sub{
    margin-top:22px;
    font-size:20px;
    line-height:1.6;
    color:var(--muted);
    max-width:700px;
  }
  .scroll-cue{
    margin-top:36px;
    font-size:20px;
    font-weight:600;
    color:var(--muted);
  }

  .section{padding:72px 0;}
  .section-label{
    font-size:16px;
    letter-spacing:0.08em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:14px;
    font-weight:bold;
  }
  h2{
    font-weight:700;
    font-size:clamp(24px, 3vw, 32px);
    max-width:760px;
    line-height:1.3;
    color:var(--text);
  }
  .section-body{
    margin-top:14px;
    color:var(--muted);
    max-width:760px;
    font-size:17px;
    line-height:1.65;
  }

  /* concept cards */
  .cards{
    margin-top:28px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
  }
  @media (max-width:900px){
    .cards{grid-template-columns:repeat(2, 1fr);}
  }
  .card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:14px;
    padding:22px 20px;
  }
  .card .icon{
    width:32px; height:32px;
    border-radius:9px;
    margin-bottom:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:14px;
    font-weight:700;
    color:#fff;
  }
  .card h4{
    font-size:16px;
    font-weight:700;
    margin-bottom:6px;
    color:var(--text);
  }
  .card p{color:var(--muted); font-size:14px; line-height:1.55;}

  /* race panel, reused for stock prediction + portfolio optimisation */
  .race-panel{
